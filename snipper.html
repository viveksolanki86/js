<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FPS Sniper Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

/* UI */

#bottomUI{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    z-index:10;
}

.gameBtn{
    width:160px;
    height:65px;
    border:none;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    color:white;
    background:linear-gradient(45deg,#ff2f2f,#ff7a00);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    cursor:pointer;
}

/* SCOPE */

#scopeOverlay{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

.scope{
    width:420px;
    height:420px;
    border-radius:50%;
    border:8px solid black;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.82);
    position:relative;
}

.scope::before,
.scope::after{
    content:"";
    position:absolute;
    background:red;
}

.scope::before{
    width:2px;
    height:100%;
    left:50%;
    transform:translateX(-50%);
}

.scope::after{
    width:100%;
    height:2px;
    top:50%;
    transform:translateY(-50%);
}

#hitText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:70px;
    font-weight:bold;
    color:red;
    display:none;
    text-shadow:0 0 20px red;
    z-index:100;
}

</style>
</head>
<body>

<div id="scopeOverlay">
    <div class="scope"></div>
</div>

<div id="hitText">HEADSHOT</div>

<div id="bottomUI">
    <button class="gameBtn" id="scopeBtn">SCOPE</button>
    <button class="gameBtn" id="shootBtn">FIRE</button>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';

/* SCENE */

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x9fdfff);

scene.fog = new THREE.Fog(
    0x9fdfff,
    80,
    300
);

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,4,12);

scene.add(camera);

/* RENDERER */

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(
    renderer.domElement
);

/* LIGHTS */

const ambient = new THREE.AmbientLight(
    0xffffff,
    0.8
);

scene.add(ambient);

const sun = new THREE.DirectionalLight(
    0xffffff,
    1.5
);

sun.position.set(50,80,30);

sun.castShadow = true;

scene.add(sun);

/* GROUND */

const ground = new THREE.Mesh(

    new THREE.PlaneGeometry(
        600,
        600
    ),

    new THREE.MeshStandardMaterial({
        color:0x3f8f3f
    })

);

ground.rotation.x = -Math.PI/2;

ground.receiveShadow = true;

scene.add(ground);

/* PLATFORM */

const platform = new THREE.Mesh(

    new THREE.BoxGeometry(
        10,
        2,
        10
    ),

    new THREE.MeshStandardMaterial({
        color:0x666666
    })

);

platform.position.y = 1;

platform.receiveShadow = true;

scene.add(platform);

/* TREES */

for(let i=0;i<80;i++){

    const trunk = new THREE.Mesh(

        new THREE.CylinderGeometry(
            0.4,
            0.5,
            4
        ),

        new THREE.MeshStandardMaterial({
            color:0x5d4037
        })

    );

    trunk.position.set(
        (Math.random()-0.5)*500,
        2,
        -Math.random()*500
    );

    scene.add(trunk);

    const leaves = new THREE.Mesh(

        new THREE.SphereGeometry(
            2.5,
            16,
            16
        ),

        new THREE.MeshStandardMaterial({
            color:0x1b5e20
        })

    );

    leaves.position.set(
        trunk.position.x,
        5,
        trunk.position.z
    );

    scene.add(leaves);
}

/* TARGETS */

const targets = [];

for(let i=0;i<12;i++){

    const target = new THREE.Mesh(

        new THREE.BoxGeometry(
            2,
            4,
            1
        ),

        new THREE.MeshStandardMaterial({
            color:0xff3333
        })

    );

    target.position.set(
        (Math.random()-0.5)*100,
        2,
        -80 - Math.random()*150
    );

    target.castShadow = true;

    scene.add(target);

    targets.push(target);
}

/* SNIPER */

const sniper = new THREE.Group();

/* BODY */

const body = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.4,
        0.4,
        4
    ),

    new THREE.MeshStandardMaterial({
        color:0x111111
    })

);

body.position.z = -2;

sniper.add(body);

/* BARREL */

const barrel = new THREE.Mesh(

    new THREE.CylinderGeometry(
        0.08,
        0.08,
        3,
        32
    ),

    new THREE.MeshStandardMaterial({
        color:0x000000
    })

);

barrel.rotation.x = Math.PI/2;

barrel.position.z = -4;

sniper.add(barrel);

/* SCOPE */

const scopePart = new THREE.Mesh(

    new THREE.CylinderGeometry(
        0.15,
        0.15,
        1.5,
        32
    ),

    new THREE.MeshStandardMaterial({
        color:0x222222
    })

);

scopePart.rotation.z = Math.PI/2;

scopePart.position.set(
    0,
    0.25,
    -2
);

sniper.add(scopePart);

/* STOCK */

const stock = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.6,
        0.3,
        1
    ),

    new THREE.MeshStandardMaterial({
        color:0x3e2723
    })

);

stock.position.z = 0.5;

sniper.add(stock);

/* ATTACH TO CAMERA */

sniper.position.set(
    0.8,
    -0.7,
    -1.5
);

camera.add(sniper);

/* FPS CAMERA SYSTEM */

let dragging = false;

let yaw = 0;
let pitch = -0.05;

let prevX = 0;
let prevY = 0;

renderer.domElement.addEventListener(
    "pointerdown",
    (e)=>{

        dragging = true;

        prevX = e.clientX;
        prevY = e.clientY;

    }
);

window.addEventListener(
    "pointerup",
    ()=>{

        dragging = false;

    }
);

window.addEventListener(
    "pointermove",
    (e)=>{

        if(!dragging) return;

        const dx = e.clientX - prevX;
        const dy = e.clientY - prevY;

        yaw -= dx * 0.003;

        pitch -= dy * 0.002;

        /* IMPORTANT LIMIT */

        pitch = Math.max(
            -0.18,
            Math.min(0.15,pitch)
        );

        camera.rotation.order = "YXZ";

        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        prevX = e.clientX;
        prevY = e.clientY;

    }
);

/* SCOPE SYSTEM */

let scoped = false;

const scopeOverlay =
document.getElementById(
    "scopeOverlay"
);

document.getElementById(
    "scopeBtn"
).addEventListener(
    "click",
    ()=>{

        scoped = !scoped;

        if(scoped){

            camera.fov = 18;

            scopeOverlay.style.display =
            "flex";

        }else{

            camera.fov = 75;

            scopeOverlay.style.display =
            "none";
        }

        camera.updateProjectionMatrix();

    }
);

/* SHOOT */

const raycaster =
new THREE.Raycaster();

const hitText =
document.getElementById(
    "hitText"
);

function shoot(){

    /* recoil */

    sniper.position.z += 0.15;

    setTimeout(()=>{
        sniper.position.z -= 0.15;
    },80);

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hits =
    raycaster.intersectObjects(
        targets
    );

    if(hits.length > 0){

        const enemy = hits[0].object;

        enemy.rotation.z = -1.5;

        enemy.position.y = -5;

        hitText.style.display =
        "block";

        setTimeout(()=>{

            hitText.style.display =
            "none";

        },500);
    }
}

document.getElementById(
    "shootBtn"
).addEventListener(
    "click",
    shoot
);

window.addEventListener(
    "dblclick",
    shoot
);

/* ANIMATION */

function animate(){

    requestAnimationFrame(
        animate
    );

    /* breathing sway */

    sniper.position.y =
        -0.7 +
        Math.sin(
            Date.now()*0.002
        ) * 0.01;

    /* moving targets */

    targets.forEach((t,i)=>{

     t.position.x =
    Math.sin(
        Date.now()*0.00015 + i
    ) * 8;
        t.rotation.y += 0.01;

    });

    renderer.render(
        scene,
        camera
    );
}

animate();

/* RESIZE */

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
        window.innerWidth /
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>
</body>
</html>
